name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Decrypt data file
        run: openssl enc -aes-256-cbc -d -salt -pbkdf2 -in public/gto-preflop-charts-all.json.enc -out public/gto-preflop-charts-all.json -pass pass:${{ secrets.DATA_KEY }}

      - run: npm ci
      - run: npm run build
        env:
          VITE_PASSWORD_HASH: ${{ secrets.PASSWORD_HASH }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
